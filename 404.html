<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません（404）｜ウインライフ ヘルパーステーション</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--rose:#D6587E;--rose-deep:#B23E63;--greige:#7A6E66;--base:#FBF7F4;--tint:#F6ECEF;--ink:#2E2A28;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Noto Sans JP",sans-serif;color:var(--ink);background:var(--base);min-height:100vh;display:flex;flex-direction:column}
.nav{background:#fbf7f4;border-bottom:1px solid #eedde2}
.nav .row{max-width:1100px;margin:0 auto;padding:0 clamp(20px,5vw,56px);height:64px;display:flex;align-items:center;justify-content:center}
.logo{font-weight:900;color:var(--rose-deep);font-size:clamp(15px,2.3vw,21px);text-decoration:none;letter-spacing:.12em;white-space:nowrap}
main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 24px;position:relative;overflow:hidden}
.code{font-size:clamp(72px,16vw,140px);font-weight:900;color:var(--tint);line-height:1;letter-spacing:.04em}
.inner{position:relative;z-index:1;max-width:560px}
h1{font-size:clamp(20px,4vw,26px);font-weight:900;margin:6px 0 14px}
p{color:var(--greige);margin-bottom:28px;line-height:1.9}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:12px;padding:14px 24px;font-size:16px;font-weight:700;text-decoration:none;min-height:52px}
.btn-rose{background:var(--rose-deep);color:#fff}
.btn-ghost{background:#fff;color:var(--rose-deep);border:2px solid var(--rose)}
footer{background:#fff;border-top:1px solid #f0e3e7;color:var(--greige);padding:24px;font-size:13px;text-align:center}
footer a{color:var(--rose-deep)}
</style>
</head>
<body>
<div class="nav"><div class="row"><a class="logo" href="top.html">ウインライフ ヘルパーステーション</a></div></div>
<main>
  <div class="inner">
    <div class="code">404</div>
    <h1>ページが見つかりませんでした</h1>
    <p>お探しのページは移動・削除されたか、URLが正しくない可能性があります。<br>お手数ですが、下記からお進みください。</p>
    <div class="btns">
      <a class="btn btn-rose" href="top.html">トップへ戻る</a>
      <a class="btn btn-ghost" href="news.html">お知らせ・ブログ</a>
      <a class="btn btn-ghost" href="contact.html">お問い合わせ</a>
    </div>
  </div>
</main>
<footer>ウインライフ ヘルパーステーション／TEL <a href="tel:0924109285">092-410-9285</a></footer>
</body>
</html>
